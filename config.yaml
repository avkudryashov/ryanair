# Конфигурация для поиска рейсов из Валенсии
origin_airport: VLC # Валенсия

# Максимальная цена туда-обратно (в EUR)
max_price: 100

# Максимальное количество результатов для вывода
max_results: 200

# Максимальное время прилета в пункт назначения (24-часовой формат)
# После этого времени прилет считается "поздним" и будет отфильтрован
max_arrival_time_destination: "22:00"

# Минимальное количество часов пребывания для поездки на 1 ночь
min_hours_for_one_night: 18

# Валюта
currency: EUR

# Гибкость по датам вылета (в днях)
# Если указано 1, то поиск будет выполняться ±1 день от заданных дат
# Например: если date_from=2024-02-15, то поиск начнется с 2024-02-14
date_flexibility_days: 1

# Исключенные страны (не Шенген) - аэропорты в этих странах будут отфильтрованы
# UK (Великобритания), Ireland (Ирландия) требуют отдельные визы
excluded_countries:
  - "United Kingdom"
  - "Ireland"

# Исключенные аэропорты (коды через запятую, например: IBZ, PMI)
# Эти направления не будут показаны в результатах
excluded_airports: []

# Диапазон дат для поиска (в формате YYYY-MM-DD)
# Если не указаны, используются параметры командной строки
date_from: null
date_to: null

# Количество ночей для поиска (список, например: [1, 2, 3])
# Если не указаны, используются параметры командной строки
nights: 1,2
